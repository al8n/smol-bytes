name: Python

on:
  push:
    branches: [main, "*.*.x"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SMOL_BYTES_MANIFEST: smol-bytes/Cargo.toml

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Create virtual environment
        run: python -m venv .venv
      - name: Configure virtual environment on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - name: Configure virtual environment on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - name: Configure virtual environment on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $venv = Join-Path $env:GITHUB_WORKSPACE '.venv'
          "VIRTUAL_ENV=$venv" >> $env:GITHUB_ENV
          (Join-Path $venv 'Scripts') >> $env:GITHUB_PATH
      - run: python -m pip install maturin pytest
      - run: cargo check --manifest-path ${{ env.SMOL_BYTES_MANIFEST }} --no-default-features --features pyo3
      - run: maturin develop --features pyo3 --manifest-path ${{ env.SMOL_BYTES_MANIFEST }}
      - run: python -m pytest tests/python/ -v

  wheels:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features pyo3 --manifest-path ${{ env.SMOL_BYTES_MANIFEST }}
      - name: Verify abi3 wheel tag
        shell: bash
        run: ls target/wheels/*cp311-abi3*.whl
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
