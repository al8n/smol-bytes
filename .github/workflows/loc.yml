name: loc 

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  loc:
    runs-on: ubuntu-latest
    env:
      GIST_PAT: ${{ secrets.GIST_PAT }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup update stable && rustup default stable
          rustup component add clippy
          rustup component add rustfmt
      
      - name: Install tokeit
        run: |
          cargo install tokeit --force
      
      - name: Count total lines of code
        run: |
          tokeit --lang rust
      - name: Notice missing GIST_PAT
        if: env.GIST_PAT == ''
        run: echo "::notice::GIST_PAT is not configured; skipping Gist upload."
      - name: Upload total loc to GitHub Gist
        if: env.GIST_PAT != ''
        uses: actions/github-script@v8
        with:
          github-token: ${{ env.GIST_PAT }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('tokeit.json', 'utf8');
            const gistId = '327b2a8aef9003246e45c6e47fe63937';
            await github.rest.gists.update({
              gist_id: gistId,
              files: {
                "smol-bytes": {
                  content: output
                }
              }
            });
